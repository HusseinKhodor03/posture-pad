<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Posture Pad</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="appHeader">
      <div>
        <h1>Posture Pad</h1>
      </div>

      <nav class="tabList">
        <button class="tabButton active" id="dashboardTab">Dashboard</button>
        <button class="tabButton" id="configTab">Configuration</button>
      </nav>
    </header>

    <section class="tabPanel" id="dashboardPanel">
      <div id="mainContainer">
        <div id="container">
          <div class="foot" id="leftFootContainer"></div>
          <div class="foot" id="rightFootContainer"></div>
        </div>

        <div id="statsContainer">
          <div class="box" id="postureSummary">
            <h3>Posture Summary</h3>
            <div id="postureState"></div>
            <div id="balance"></div>
            <div id="stability"></div>
            <div id="suggestion"></div>
          </div>

          <div id="footMetricsContainer">
            <div class="box" id="leftFootMetrics">
              <h3>Left Foot Metrics</h3>
              <div id="leftTotal"></div>
              <div id="leftCopX"></div>
              <div id="leftCopY"></div>
              <div id="leftForefoot"></div>
              <div id="leftRearfoot"></div>
              <div id="leftMedial"></div>
              <div id="leftLateral"></div>
            </div>

            <div class="box" id="rightFootMetrics">
              <h3>Right Foot Metrics</h3>
              <div id="rightTotal"></div>
              <div id="rightCopX"></div>
              <div id="rightCopY"></div>
              <div id="rightForefoot"></div>
              <div id="rightRearfoot"></div>
              <div id="rightMedial"></div>
              <div id="rightLateral"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="tabPanel" id="configPanel" hidden>
      <div class="configCard">
        <span class="statusBadge" id="bleStatus">Not connected</span>
        <h2>Device configuration</h2>
        <p>
          Connect to your Posture Pad over Bluetooth to begin setup.
        </p>

        <div class="emptyState">
          <h3 id="bleDeviceName">No Posture Pad connected</h3>
          <p id="bleMessage">Make sure your device is powered on and nearby.</p>
          <button class="connectButton" id="connectBleButton">
            Connect Posture Pad
          </button>

          <div id="bleDeviceDetails" hidden>
            <p>Device ID: <span id="bleDeviceId"></span></p>
            <p>Device status: <span id="bleDeviceStatus"></span></p>
          </div>
        </div>
      </div>
    </section>

    <script type="module" src="script.js"></script>
  </body>
</html>
